    <!DOCTYPE html>

        <meta charset="UTF-8" />

      <header>
        <a href="index.html">AD</a>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-icon">
          <div class="line"></div>

        </nav>
      </header>
    <main class="mainForm">
           <form class="formulario">
            <span class="legend">Datos de contacto</span>
            <fieldset class="contact-data">
              <div class="field">
                <label for="nombre">Nombre</label>
                <input
                  type="text"
                  id="nombre"
                  name="nombre"
                  placeholder="Tu nombre"
                />
              </div>

              <div class="field">
                <label for="email">Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="tu@email.com"
                />
              </div>
              <div class ="field">
                <label for="phone">Numero de telefono</label>
                <input
                 type="tel" 
                 id="phone" 
                 name="phone" 
                 pattern="[0-9]{9}" 
                 placeholder="Numero de telefono" 
                 required>
              </div>

              <div class="field">
                <label for="mensaje">Mensaje</label>
                <textarea
                  id="mensaje"
                  name="mensaje"
                  placeholder="Cuéntame tu proyecto..."
                ></textarea>
              </div>

              <button class="boton" name="enviar">Enviar</button>
            </fieldset>
          </form>
        </main>
