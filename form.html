<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Contacto</title>
    <head>
    </head>
    <!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="CSS/styles.css" />
        <link
          href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap"
          rel="stylesheet"
        />
        <title>Contacto</title>
      </head>
      <body>
        <div class="header" id="header"></div>
      <main class="mainForm">
        <form class="formulario">
          <span class="legend">Datos de contacto</span>
          <fieldset class="contact-data">
            <div class="field">
              <label for="nombre">Nombre</label>
              <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Tu nombre"
              />
            </div>
            
            <div class="field">
              <label for="email">Email</label>
              <input
              type="email"
              id="email"
              name="email"
              placeholder="tu@email.com"
              />
            </div>
            <div class ="field">
              <label for="phone">Numero de telefono</label>
              <input
              type="tel" 
              id="phone" 
              name="phone" 
              pattern="[0-9]{9}" 
              placeholder="Numero de telefono" 
              required>
            </div>
            
            <div class="field">
              <label for="mensaje">Mensaje</label>
              <textarea
              id="mensaje"
              name="mensaje"
              placeholder="Cuéntame tu proyecto..."
              ></textarea>
            </div>
            
            <button class="boton" name="enviar">Enviar</button>
          </fieldset>
        </form>
        </main>
          <div class="footer" id="footer"></div>
           <script type="module" src="JS/script.js"></script>

      </body>
    </html>
  </head>
</html>
