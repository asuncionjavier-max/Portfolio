<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Contacto</title>
    <head>
      <h1>Formulario de Contacto</h1>
    </head>
    <!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <link
          href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap"
          rel="stylesheet"
        />
        <title>Contacto</title>
      </head>
      <body>
        <main class="mainForm">
          <form class="formulario">
            <span class="legend">Datos de contacto</span>
            <fieldset class="contact-data">
              <div class="field">
                <label for="nombre">Nombre</label>
                <input
                  type="text"
                  id="nombre"
                  name="nombre"
                  placeholder="Tu nombre"
                />
              </div>

              <div class="field">
                <label for="email">Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="tu@email.com"
                />
              </div>

              <div class="field">
                <label for="mensaje">Mensaje</label>
                <textarea
                  id="mensaje"
                  name="mensaje"
                  placeholder="Cuéntame tu proyecto..."
                ></textarea>
              </div>

              <button class="boton" name="enviar">Enviar</button>
            </fieldset>
          </form>
        </main>

        <footer>
          <nav>
            <p>
              &copy;<em
                >2026 Javier Asunción Tarrega - FullStack Developer & Marketing
                Assistant</em
              >
            </p>
            <ul>
              <li>
                <a
                  href="https://www.linkedin.com/in/javier-asunci%C3%B3n-047499252/"
                  target="_blank"
                  >Linkedin</a
                >
              </li>
              <li>
                <a href="https://github.com/asuncionjavier-max" target="_blank"
                  >Github</a
                >
              </li>
            </ul>
          </nav>
        </footer>
      </body>
    </html>
  </head>
</html>
